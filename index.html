<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>演講即時翻譯官 (Web Speech API + GCP)</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-fade-in { animation: fadeIn 0.12s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 min-h-screen flex flex-col justify-between">

  <div class="w-full max-w-xl mx-auto space-y-4 flex-1 flex flex-col">
    <h1 class="text-xl font-bold text-center text-indigo-600 my-2">⚡ Web Speech API + GCP 演講即時翻譯</h1>
    
    <div class="bg-white p-4 rounded-xl shadow-xs border border-slate-100 space-y-3">
      <div>
        <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">請選擇演講者使用的語系：</label>
        <select id="langSelect" class="w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
          <option value="en-US">英文 (English)</option>
          <option value="ja-JP">日文 (日本語)</option>
          <option value="ko-KR">韓文 (한국어)</option>
          <option value="zh-TW">中文 (繁體台灣)</option>
        </select>
      </div>
      
      <div class="flex items-center justify-between text-xs font-mono bg-slate-50 p-2 rounded-lg border border-slate-100">
        <span class="text-slate-500">🛰️ Web Speech API 狀態：</span>
        <span id="statusLabel" class="text-slate-500 font-bold">● 閒置中</span>
      </div>
    </div>

    <div class="flex-1 bg-white p-4 rounded-xl shadow-xs border border-slate-100 flex flex-col min-h-[420px]">
      <div class="flex-1 overflow-y-auto space-y-4 max-h-[65vh]" id="chatBox">
        <p id="placeholderText" class="text-slate-400 text-center text-sm mt-10">
          🚀 點擊下方按鈕啟動。<br>演講者開口時，原文會透過 Web Speech API 零延遲彈出，定稿後秒速送往 GCP 翻譯成繁中！
        </p>
      </div>
    </div>
  </div>

  <div class="w-full max-w-xl mx-auto mt-4 sticky bottom-0 bg-slate-50 py-2">
    <button id="startBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98">
      <span id="btnIcon">🎙️</span> <span id="btnText">啟動 Web Speech API 監聽</span>
    </button>
  </div>

  <script>
    // 🔗 請在此處填入您的 GAS 網頁應用程式 URL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzaA6a8ow4w8y8F7Oi7EqShIwsoph4CzHDyOM_qNXJ7bhl4_deuUrH1N_Jf6J2aiYxH9A/exec"; 

    const startBtn = document.getElementById('startBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const langSelect = document.getElementById('langSelect');
    const chatBox = document.getElementById('chatBox');
    const placeholderText = document.getElementById('placeholderText');
    const statusLabel = document.getElementById('statusLabel');

    let recognition = null;
    let isListening = false;
    let currentInterimBlock = null; 

    startBtn.addEventListener('click', () => {
      if (!isListening) startSpeechRecognition();
      else stopSpeechRecognition();
    });

    function startSpeechRecognition() {
      // 🛠️ 初始化瀏覽器原生 Web Speech API
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert("您的瀏覽器不支援 Web Speech API，請改用 Google Chrome 瀏覽器。");
        return;
      }

      recognition = new SpeechRecognition();
      recognition.continuous = true;       // 🔥 關鍵：維持不間斷的演講錄音監聽
      recognition.interimResults = true;   // 🔥 關鍵：開啟毫秒級即時跳字功能
      recognition.lang = langSelect.value;

      recognition.onstart = () => {
        isListening = true;
        if (placeholderText) placeholderText.remove();
        statusLabel.innerText = "● 語音即時監聽中 (字隨音噴)";
        statusLabel.className = "text-emerald-600 font-bold animate-pulse";
        
        startBtn.className = "w-full py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
        btnText.innerText = "停止演講監聽";
        btnIcon.innerText = "🛑";
      };

      recognition.onresult = (event) => {
        let interimTranscript = '';
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }

        // 🟢 1. 處理 Web Speech API 【動態暫存跳字】 (體感 0 延遲)
        if (interimTranscript.trim().length > 0) {
          if (!currentInterimBlock) {
            currentInterimBlock = document.createElement('div');
            currentInterimBlock.className = "bg-slate-100 p-2.5 rounded-xl max-w-[85%] self-start text-xs text-slate-400 italic animate-fade-in";
            chatBox.appendChild(currentInterimBlock);
          }
          currentInterimBlock.innerText = "🎤 " + interimTranscript;
          chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 🔵 2. 處理 Web Speech API 【語音斷句定稿】 -> 立即丟給 GCP 翻譯
        if (finalTranscript.trim().length > 0) {
          if (currentInterimBlock) {
            currentInterimBlock.remove(); 
            currentInterimBlock = null;
          }
          
          // 渲染拍板定案的原文
          renderOriginalText(finalTranscript);
          // 秒速發送微小的「純文字」給 GCP Cloud Translation API
          sendTextToGCPTranslate(finalTranscript, langSelect.value);
        }
      };

      recognition.onerror = (event) => {
        console.error("Web Speech API 錯誤:", event.error);
        if (event.error === 'not-allowed') {
          alert("請授權麥克風權限以供 Web Speech API 使用。");
          stopSpeechRecognition();
        }
      };

      recognition.onend = () => {
        // 演講防禦：避免長演講時瀏覽器省電或意外斷開，原地自動復活重啟
        if (isListening) recognition.start();
      };

      recognition.start();
    }

    function stopSpeechRecognition() {
      isListening = false;
      if (recognition) recognition.stop();
      statusLabel.innerText = "● 已停止監聽";
      statusLabel.className = "text-slate-500 font-bold";
      
      startBtn.className = "w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
      btnText.innerText = "啟動 Web Speech API 監聽";
      btnIcon.innerText = "🎙️";
    }

    function sendTextToGCPTranslate(text, lang) {
      const loadingNode = createLoadingMessage();

      // 發送純文字給後端
      fetch(GAS_WEB_APP_URL, {
        method: "POST",
        body: JSON.stringify({ text: text, sourceLang: lang })
      })
      .then(res => res.json())
      .then(data => {
        loadingNode.remove();
        if (data.success) {
          renderTranslatedText(data.translatedText);
        } else {
          renderErrorDialogue("GCP Translation 未回應");
        }
      })
      .catch(err => {
        loadingNode.remove();
        renderErrorDialogue("網路連線超時");
      });
    }

    function createLoadingMessage() {
      const wrapper = document.createElement('div');
      wrapper.className = "space-y-1 w-full animate-pulse";
      wrapper.innerHTML = `<div class="bg-indigo-100/60 p-2 rounded-lg max-w-[30%] text-xs text-indigo-400">✨ GCP 翻譯中...</div>`;
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
      return wrapper;
    }

    function renderOriginalText(text) {
      const originalDiv = document.createElement('div');
      originalDiv.className = "bg-slate-100 p-2.5 rounded-xl max-w-[85%] self-start text-xs text-slate-600 font-medium animate-fade-in";
      originalDiv.innerText = "🎤 " + text;
      chatBox.appendChild(originalDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function renderTranslatedText(translatedText) {
      const translatedDiv = document.createElement('div');
      translatedDiv.className = "bg-indigo-50 p-3 rounded-xl max-w-[85%] ml-auto text-base font-semibold text-indigo-950 border border-indigo-100 mt-1 mb-3 shadow-xs animate-fade-in";
      translatedDiv.innerText = "📳 " + translatedText;
      chatBox.appendChild(translatedDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function renderErrorDialogue(errorMsg) {
      const errorDiv = document.createElement('div');
      errorDiv.className = "bg-rose-50 text-rose-700 p-2 rounded-lg max-w-[80%] mx-auto text-xs border border-rose-200 text-center opacity-70";
      errorDiv.innerText = "⚠️ " + errorMsg;
      chatBox.appendChild(errorDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
