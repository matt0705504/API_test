<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>即時語音翻譯官</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-fade-in {
      animation: fadeIn 0.2s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 min-h-screen flex flex-col justify-between">

  <div class="w-full max-w-md mx-auto space-y-4 flex-1 flex flex-col">
    <h1 class="text-xl font-bold text-center text-indigo-600 my-2">🎙️ 即時語音翻譯官 (滑動流暢版)</h1>
    
    <div class="bg-white p-3 rounded-xl shadow-xs border border-slate-100">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">請選擇聆聽的語系：</label>
      <select id="langSelect" class="w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="en-US">英文 (English)</option>
        <option value="ja-JP">日文 (日本語)</option>
        <option value="ko-KR">韓文 (한국어)</option>
      </select>
    </div>

    <div class="flex-1 bg-white p-4 rounded-xl shadow-xs border border-slate-100 flex flex-col min-h-[350px]">
      <div class="flex-1 overflow-y-auto space-y-4 max-h-[65vh]" id="chatBox">
        <p id="placeholderText" class="text-slate-400 text-center text-sm mt-10">
          💡 請確保使用 Safari 或 Chrome 開啟。<br>點擊下方按鈕開始說話！
        </p>
      </div>
    </div>
  </div>

  <div class="w-full max-w-md mx-auto mt-4 sticky bottom-0 bg-slate-50 py-2">
    <button id="startBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98">
      <span id="btnIcon">🎙️</span> <span id="btnText">開始聆聽</span>
    </button>
  </div>

  <script>
    // 🔗 固定的 GAS 網頁應用程式 URL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbykYYBFOJrudwkIBQpNBFu_XegToC7nlYtJYnZigGanFHVlLIwj9syZdp-Cp4kO-BlA/exec"; 

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const startBtn = document.getElementById('startBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const langSelect = document.getElementById('langSelect');
    const chatBox = document.getElementById('chatBox');
    const placeholderText = document.getElementById('placeholderText');

    let recognition = null;
    let isListening = false;
    let googleTranslateTimer = null;

    // 🚀 滑動視窗快取變數
    let lastSentText = "";       // 紀錄上一次真正送出翻譯的「完整原文總串」
    let currentSessionText = ""; // 紀錄當前整段對話累積下來的總純文字

    if (!SpeechRecognition) {
      alert("瀏覽器不支援語音辨識，請改用 Safari (iOS) 或 Chrome (Android)。");
    } else {
      // 初始化語音辨識
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true; // 保持極速回傳，畫面字體流暢更新

      // 當辨識到語音時觸發
      recognition.onresult = function(event) {
        if (placeholderText) placeholderText.remove();

        let interimTranscript = '';
        let finalTranscript = '';

        // 完整讀取當前軌道內的所有文字，絕不丟棄任何碎片
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }

        // 清理標點符號，保留純文字內容
        let cleanFinal = finalTranscript.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?？。，！]/g," ");
        let cleanInterim = interimTranscript.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?？。，！]/g," ");
        
        // 彙整出當前不中斷的總文字量
        currentSessionText = (cleanFinal + " " + cleanInterim).trim().replace(/\s+/g, " ");

        if (!currentSessionText || currentSessionText.length === 0) return;

        // 1. 🚀 畫面原文同步顯示：切出「尚未翻譯的新內容」顯示在畫面上，體感完全不卡頓
        let displayLiveText = currentSessionText;
        if (lastSentText && currentSessionText.startsWith(lastSentText)) {
          displayLiveText = currentSessionText.substring(lastSentText.length).trim();
        }
        if (displayLiveText.length > 0) {
          updateLiveOriginalMessage(displayLiveText);
        }

        // 2. 🚀 滑動增量判定：如果講者一直講，新增加的字數一滿 12 個字，立刻自動切片送翻
        if (displayLiveText.length >= 12) {
          clearTimeout(googleTranslateTimer);
          sendToTranslate(displayLiveText, currentSessionText);
          return;
        }

        // 3. 🚀 安全時間判定：如果新字還沒滿 12 個字，但講者停頓超過 750 毫秒 (0.75秒)，也送出翻譯
        clearTimeout(googleTranslateTimer);
        googleTranslateTimer = setTimeout(() => {
          if (displayLiveText.length > 0) {
            sendToTranslate(displayLiveText, currentSessionText);
          }
        }, 750); 
      };

      // 核心發送翻譯函式
      function sendToTranslate(textToTranslate, fullSnapshot) {
        if (!textToTranslate || textToTranslate.trim().length === 0) return;

        // 🚀 關鍵同步鎖：立刻拉高水位線，避免下個 fetch 重複送出相同區段
        lastSentText = fullSnapshot;

        const sourceLangShort = langSelect.value.split('-')[0]; 
        const targetUrl = `${GAS_WEB_APP_URL}?text=${encodeURIComponent(textToTranslate.trim())}&sourceLang=${sourceLangShort}`;

        fetch(targetUrl, {
          method: "GET",
          mode: "cors"
        })
        .then(res => {
          if (!res.ok) throw new Error("網路回應不正常");
          return res.json();
        })
        .then(response => {
          if (response.success) {
            // 翻譯成功，定格畫面原文框，輸出翻譯
            finalizeLiveMessage();
            appendMessage(response.translatedText, 'translated');
          }
        })
        .catch(err => {
          console.error("連線發送失敗:", err);
        });
      }

      // 錯誤處理
      recognition.onerror = function(event) {
        console.error("語音辨識發生錯誤: ", event.error);
        if (event.error === 'not-allowed') {
          alert("麥克風存取遭拒，請至手機設定中確認瀏覽器麥克風權限已開啟。");
          stopListening();
        }
      };

      // 自動重啟機制
      recognition.onend = function() {
        if (isListening) {
          try {
            recognition.start();
          } catch(e) {
            console.log("重啟辨識中...");
          }
        }
      };
    }

    // 按鈕切換點擊事件
    startBtn.addEventListener('click', () => {
      if (!recognition) return;
      if (!isListening) {
        startListening();
      } else {
        stopListening();
      }
    });

    function startListening() {
      isListening = true;
      recognition.lang = langSelect.value;
      lastSentText = ""; 
      currentSessionText = "";
      try {
        recognition.start();
        startBtn.className = "w-full py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
        btnText.innerText = "正在聆聽、即時翻譯中...";
        btnIcon.innerText = "🛑";
      } catch (e) {
        console.error("啟動辨識失敗:", e);
      }
    }

    function stopListening() {
      isListening = false;
      recognition.stop();
      startBtn.className = "w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
      btnText.innerText = "開始聆聽";
      btnIcon.innerText = "🎙️";
    }

    // 輔助函式：即時更新畫面上尚未翻譯的原文
    function updateLiveOriginalMessage(text) {
      let lastMsg = chatBox.lastElementChild;
      if (lastMsg && lastMsg.classList.contains('is-live-original')) {
        lastMsg.innerText = "🗣️ " + text;
      } else {
        const msgDiv = document.createElement('div');
        msgDiv.className = "bg-slate-100 p-3 rounded-xl max-w-[85%] self-start text-sm text-slate-600 animate-fade-in is-live-original";
        msgDiv.innerText = "🗣️ " + text;
        chatBox.appendChild(msgDiv);
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 輔助函式：定格當前原文對話框
    function finalizeLiveMessage() {
      let lastMsg = chatBox.lastElementChild;
      if (lastMsg && lastMsg.classList.contains('is-live-original')) {
        lastMsg.classList.remove('is-live-original');
      }
    }

    // 在畫面上產生右側翻譯對話框
    function appendMessage(text, type) {
      const msgDiv = document.createElement('div');
      if (type === 'translated') {
        msgDiv.className = "bg-indigo-50 p-3 rounded-xl max-w-[85%] ml-auto text-base font-semibold text-indigo-950 border border-indigo-100 mt-1 mb-2 shadow-xs animate-fade-in";
        msgDiv.innerText = "📳 " + text;
      } else {
        msgDiv.className = "bg-red-50 text-red-600 p-2 text-xs rounded-lg text-center font-medium animate-fade-in";
        msgDiv.innerText = text;
      }
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight; 
    }
  </script>
</body>
</html>
