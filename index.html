<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>即時語音翻譯官</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-fade-in {
      animation: fadeIn 0.15s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 min-h-screen flex flex-col justify-between">

  <div class="w-full max-w-md mx-auto space-y-4 flex-1 flex flex-col">
    <h1 class="text-xl font-bold text-center text-indigo-600 my-2">🎙️ 即時語音翻譯官 (極速無重複版)</h1>
    
    <div class="bg-white p-3 rounded-xl shadow-xs border border-slate-100">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">請選擇聆聽的語系：</label>
      <select id="langSelect" class="w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="en-US">英文 (English)</option>
        <option value="ja-JP">日文 (日本語)</option>
        <option value="ko-KR">韓文 (한국어)</option>
      </select>
    </div>

    <div class="flex-1 bg-white p-4 rounded-xl shadow-xs border border-slate-100 flex flex-col min-h-[350px]">
      <div class="flex-1 overflow-y-auto space-y-4 max-h-[65vh]" id="chatBox">
        <p id="placeholderText" class="text-slate-400 text-center text-sm mt-10">
          💡 請確保使用 Safari 或 Chrome 開啟。<br>點擊下方按鈕開始說話！
        </p>
      </div>
    </div>
  </div>

  <div class="w-full max-w-md mx-auto mt-4 sticky bottom-0 bg-slate-50 py-2">
    <button id="startBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98">
      <span id="btnIcon">🎙️</span> <span id="btnText">開始聆聽</span>
    </button>
  </div>

  <script>
    // 🔗 固定的 GAS 網頁應用程式 URL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbykYYBFOJrudwkIBQpNBFu_XegToC7nlYtJYnZigGanFHVlLIwj9syZdp-Cp4kO-BlA/exec"; 

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const startBtn = document.getElementById('startBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const langSelect = document.getElementById('langSelect');
    const chatBox = document.getElementById('chatBox');
    const placeholderText = document.getElementById('placeholderText');

    let recognition = null;
    let isListening = false;
    let googleTranslateTimer = null;
    let isTranslatingLock = false; 

    // 🚀 全新斷句流核心控制索引
    let completedSegmentsCount = 0; // 記錄已經被官方斷句(isFinal)並成功發送的片段數量

    if (!SpeechRecognition) {
      alert("瀏覽器不支援語音辨識，請改用 Safari (iOS) 或 Chrome (Android)。");
    } else {
      // 初始化語音辨識
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true; // 開啟即時回傳以更新畫面原文

      // 當辨識到語音時觸發
      recognition.onresult = function(event) {
        if (placeholderText) placeholderText.remove();

        let interimTranscript = '';
        let hasNewFinal = false;
        let latestFinalText = '';

        // 檢查從我們上次處理完之後，有沒有誕生全新的「官方確定斷句(isFinal)」
        for (let i = completedSegmentsCount; i < event.results.length; ++i) {
          let phrase = event.results[i][0].transcript.trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?？。，！]/g,"");
          if (!phrase) continue;

          if (event.results[i].isFinal) {
            latestFinalText = phrase;
            // 標記抓到了真正的斷句節點
            hasNewFinal = true; 
            completedSegmentsCount = i + 1; // 更新索引，這個節點永遠不重複讀取
            break; 
          } else {
            interimTranscript = phrase;
          }
        }

        // 優先發送官方判定的 Final 句子；如果還沒判定，就拿目前的 Interim 暫時字串
        let textToSend = hasNewFinal ? latestFinalText : interimTranscript;
        
        if (!textToSend || textToSend.length === 0) return;

        // 實時在手機畫面上更新這句話（字會跟著同步跑）
        updateLiveOriginalMessage(textToSend);

        // 🚀 防火牆 1：如果官方提早判定斷句(isFinal)成立，立刻清除定時器，10毫秒內無延遲光速送翻！
        if (hasNewFinal) {
          clearTimeout(googleTranslateTimer);
          sendToTranslate(textToSend);
          return;
        }

        // 🚀 防火牆 2：字數強切機制。如果講者一直不點頭斷句，但單句長度已經滿 25 個字，強切送翻
        if (textToSend.length >= 25) {
          clearTimeout(googleTranslateTimer);
          completedSegmentsCount = event.results.length; // 將目前所有碎片標記為已處理，清空下一輪
          sendToTranslate(textToSend);
          return;
        }

        // 🚀 防火牆 3：時間防抖延遲。如果只是暫時結果(Interim)，停頓超過 450 毫秒(0.45秒)就認定說完送翻！
        clearTimeout(googleTranslateTimer);
        googleTranslateTimer = setTimeout(() => {
          // 強切時間到，把當前這個節點視為已完成
          completedSegmentsCount = event.results.length;
          sendToTranslate(textToSend);
        }, 450); // 💡 已調低至 450ms（極速狀態）
      };

      // 核心發送翻譯函式
      function sendToTranslate(textToTranslate) {
        if (isTranslatingLock || !textToTranslate || textToTranslate.trim().length === 0) return;

        isTranslatingLock = true;
        const sourceLangShort = langSelect.value.split('-')[0]; 
        const targetUrl = `${GAS_WEB_APP_URL}?text=${encodeURIComponent(textToTranslate)}&sourceLang=${sourceLangShort}`;

        fetch(targetUrl, {
          method: "GET",
          mode: "cors"
        })
        .then(res => {
          if (!res.ok) throw new Error("網路回應不正常");
          return res.json();
        })
        .then(response => {
          if (response.success) {
            // 翻譯成功，定格當前對話框，右側彈出繁中
            finalizeLiveMessage();
            appendMessage(response.translatedText, 'translated');
          }
        })
        .catch(err => {
          console.error("連線失敗:", err);
        })
        .finally(() => {
          // 發送完畢即刻開鎖
          isTranslatingLock = false;
        });
      }

      // 錯誤處理
      recognition.onerror = function(event) {
        console.error("語音辨識發生錯誤: ", event.error);
        if (event.error === 'not-allowed') {
          alert("麥克風存取遭拒，請至手機設定中確認瀏覽器麥克風權限已開啟。");
          stopListening();
        }
      };

      // 自動重啟機制
      recognition.onend = function() {
        if (isListening) {
          try {
            recognition.start();
          } catch(e) {
            console.log("重啟辨識中...");
          }
        }
      };
    }

    // 按鈕切換點擊事件
    startBtn.addEventListener('click', () => {
      if (!recognition) return;
      if (!isListening) {
        startListening();
      } else {
        stopListening();
      }
    });

    function startListening() {
      isListening = true;
      recognition.lang = langSelect.value;
      completedSegmentsCount = 0; // 重設索引
      isTranslatingLock = false;
      try {
        recognition.start();
        startBtn.className = "w-full py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
        btnText.innerText = "正在聆聽、即時翻譯中...";
        btnIcon.innerText = "🛑";
      } catch (e) {
        console.error("啟動辨識失敗:", e);
      }
    }

    function stopListening() {
      isListening = false;
      recognition.stop();
      startBtn.className = "w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
      btnText.innerText = "開始聆聽";
      btnIcon.innerText = "🎙️";
    }

    // 輔助函式：即時更新畫面上尚未翻譯的原文
    function updateLiveOriginalMessage(text) {
      let lastMsg = chatBox.lastElementChild;
      if (lastMsg && lastMsg.classList.contains('is-live-original')) {
        lastMsg.innerText = "🗣️ " + text;
      } else {
        const msgDiv = document.createElement('div');
        msgDiv.className = "bg-slate-100 p-3 rounded-xl max-w-[85%] self-start text-sm text-slate-600 animate-fade-in is-live-original";
        msgDiv.innerText = "🗣️ " + text;
        chatBox.appendChild(msgDiv);
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 輔助函式：定格當前原文對話框
    function finalizeLiveMessage() {
      let lastMsg = chatBox.lastElementChild;
      if (lastMsg && lastMsg.classList.contains('is-live-original')) {
        lastMsg.classList.remove('is-live-original');
      }
    }

    // 在畫面上產生右側翻譯對話框
    function appendMessage(text, type) {
      const msgDiv = document.createElement('div');
      if (type === 'translated') {
        msgDiv.className = "bg-indigo-50 p-3 rounded-xl max-w-[85%] ml-auto text-base font-semibold text-indigo-950 border border-indigo-100 mt-1 mb-2 shadow-xs animate-fade-in";
        msgDiv.innerText = "📳 " + text;
      } else {
        msgDiv.className = "bg-red-50 text-red-600 p-2 text-xs rounded-lg text-center font-medium animate-fade-in";
        msgDiv.innerText = text;
      }
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight; 
    }
  </script>
</body>
</html>
