<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>即時語音翻譯官</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-fade-in {
      animation: fadeIn 0.25s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 min-h-screen flex flex-col justify-between">

  <div class="w-full max-w-md mx-auto space-y-4 flex-1 flex flex-col">
    <h1 class="text-xl font-bold text-center text-indigo-600 my-2">🎙️ 即時語音翻譯官 (長對話緩衝版)</h1>
    
    <div class="bg-white p-3 rounded-xl shadow-xs border border-slate-100">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">請選擇聆聽的語系：</label>
      <select id="langSelect" class="w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="en-US">英文 (English)</option>
        <option value="ja-JP">日文 (日本語)</option>
        <option value="ko-KR">韓文 (한국어)</option>
      </select>
    </div>

    <div class="flex-1 bg-white p-4 rounded-xl shadow-xs border border-slate-100 flex flex-col min-h-[350px]">
      <div class="flex-1 overflow-y-auto space-y-4 max-h-[65vh]" id="chatBox">
        <p id="placeholderText" class="text-slate-400 text-center text-sm mt-10">
          💡 請確保使用 Safari 或 Chrome 開啟。<br>點擊下方按鈕開始說話！
        </p>
      </div>
    </div>
  </div>

  <div class="w-full max-w-md mx-auto mt-4 sticky bottom-0 bg-slate-50 py-2">
    <button id="startBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98">
      <span id="btnIcon">🎙️</span> <span id="btnText">開始聆聽</span>
    </button>
  </div>

  <script>
    // 🔗 這裡已經填入你固定的 GAS 網頁應用程式 URL，無須再修改
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbykYYBFOJrudwkIBQpNBFu_XegToC7nlYtJYnZigGanFHVlLIwj9syZdp-Cp4kO-BlA/exec"; 

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const startBtn = document.getElementById('startBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const langSelect = document.getElementById('langSelect');
    const chatBox = document.getElementById('chatBox');
    const placeholderText = document.getElementById('placeholderText');

    let recognition = null;
    let isListening = false;
    let googleTranslateTimer = null;
    let isTranslatingLock = false; 

    // 🚀 緩衝區核心變數
    let textBuffer = "";       // 當前還沒送去翻譯的語音累積緩衝區
    let lastSentText = "";     // 記錄最後一次發送成功的文字快取

    if (!SpeechRecognition) {
      alert("瀏覽器不支援語音辨識，請改用 Safari (iOS) 或 Chrome (Android)。");
    } else {
      // 初始化語音辨識
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true; 

      // 當辨識到語音時觸發
      recognition.onresult = function(event) {
        let interimTranscript = '';
        let finalTranscript = '';

        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }

        // 彙整最新完整字句，並清除所有的標點符號與前後空白
        let currentText = (finalTranscript || interimTranscript).trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?？。，！]/g,"");
        
        if (!currentText || currentText.length === 0) return;
        if (placeholderText) placeholderText.remove();

        // 🚀 智慧滾動計算：算出扣除「已經翻過的舊字」之後，這一次講話新增加的內容是什麼
        let newContent = currentText;
        if (lastSentText && currentText.startsWith(lastSentText)) {
          newContent = currentText.substring(lastSentText.length).trim();
        }

        // 如果連新內容都是空的，代表講者還沒講出新東西，直接攔截
        if (!newContent || newContent.length === 0) return;

        // 實時更新畫面上最新尚未翻譯的原文
        updateLiveOriginalMessage(newContent);

        // 🚀 防火牆 1：字數緩衝強制切割機制 (Buffer Threshold)
        // 如果新內容累積超過 40 個字，為了不讓翻譯卡死或太長，不等停頓，直接強制送出翻譯！
        if (newContent.length >= 40) {
          clearTimeout(googleTranslateTimer);
          sendToTranslate(newContent, currentText);
          return;
        }

        // 🚀 防火牆 2：時間防抖判定機制
        // 如果還沒滿 40 個字，只要講者停頓超過 800 毫秒 (0.8秒)，就送出這段新累積的內容
        clearTimeout(googleTranslateTimer);
        googleTranslateTimer = setTimeout(() => {
          sendToTranslate(newContent, currentText);
        }, 800); 
      };

      // 核心發送翻譯函式
      function sendToTranslate(textToTranslate, fullTranscriptSoFar) {
        if (isTranslatingLock || !textToTranslate || textToTranslate.trim().length === 0) return;

        isTranslatingLock = true;
        
        // 🚀 更新快取鎖：把「到目前為止已經送去翻的內容」記錄起來，下一波語音進來時就會自動被扣除
        lastSentText = fullTranscriptSoFar;

        const sourceLangShort = langSelect.value.split('-')[0]; 
        const targetUrl = `${GAS_WEB_APP_URL}?text=${encodeURIComponent(textToTranslate)}&sourceLang=${sourceLangShort}`;

        fetch(targetUrl, {
          method: "GET",
          mode: "cors"
        })
        .then(res => {
          if (!res.ok) throw new Error("網路回應不正常");
          return res.json();
        })
        .then(response => {
          if (response.success) {
            // 翻譯成功，固定當前這個緩衝原文框，並吐出新翻譯
            finalizeLiveMessage();
            appendMessage(response.translatedText, 'translated');
          }
        })
        .catch(err => {
          console.error("緩衝連線失敗:", err);
        })
        .finally(() => {
          // 🔓 短暫延遲解鎖，保持傳輸通道有序
          setTimeout(() => { isTranslatingLock = false; }, 150);
        });
      }

      // 錯誤處理
      recognition.onerror = function(event) {
        console.error("語音辨識發生錯誤: ", event.error);
        if (event.error === 'not-allowed') {
          alert("麥克風存取遭拒，請至手機設定中確認瀏覽器麥克風權限已開啟。");
          stopListening();
        }
      };

      // 自動重啟機制
      recognition.onend = function() {
        if (isListening) {
          try {
            recognition.start();
          } catch(e) {
            console.log("重啟辨識中...");
          }
        }
      };
    }

    // 按鈕切換點擊事件
    startBtn.addEventListener('click', () => {
      if (!recognition) return;
      if (!isListening) {
        startListening();
      } else {
        stopListening();
      }
    });

    function startListening() {
      isListening = true;
      recognition.lang = langSelect.value;
      lastSentText = ""; 
      isTranslatingLock = false;
      try {
        recognition.start();
        startBtn.className = "w-full py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
        btnText.innerText = "正在聆聽、即時翻譯中...";
        btnIcon.innerText = "🛑";
      } catch (e) {
        console.error("啟動辨識失敗:", e);
      }
    }

    function stopListening() {
      isListening = false;
      recognition.stop();
      startBtn.className = "w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
      btnText.innerText = "開始聆聽";
      btnIcon.innerText = "🎙️";
    }

    // 輔助函式：用來即時更新畫面上「當前累積緩衝的原文」
    function updateLiveOriginalMessage(text) {
      let lastMsg = chatBox.lastElementChild;
      if (lastMsg && lastMsg.classList.contains('is-live-original')) {
        lastMsg.innerText = "🗣️ " + text;
      } else {
        const msgDiv = document.createElement('div');
        msgDiv.className = "bg-slate-100 p-3 rounded-xl max-w-[85%] self-start text-sm text-slate-600 animate-fade-in is-live-original";
        msgDiv.innerText = "🗣️ " + text;
        chatBox.appendChild(msgDiv);
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    // 輔助函式：當一句緩衝包翻譯完成，移除其 live 狀態
    function finalizeLiveMessage() {
      let lastMsg = chatBox.lastElementChild;
      if (lastMsg && lastMsg.classList.contains('is-live-original')) {
        lastMsg.classList.remove('is-live-original');
      }
    }

    // 在畫面上產生右側翻譯對話框
    function appendMessage(text, type) {
      const msgDiv = document.createElement('div');
      if (type === 'translated') {
        msgDiv.className = "bg-indigo-50 p-3 rounded-xl max-w-[85%] ml-auto text-base font-semibold text-indigo-950 border border-indigo-100 mt-1 mb-2 shadow-xs animate-fade-in";
        msgDiv.innerText = "📳 " + text;
      } else {
        msgDiv.className = "bg-red-50 text-red-600 p-2 text-xs rounded-lg text-center font-medium animate-fade-in";
        msgDiv.innerText = text;
      }
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight; 
    }
  </script>
</body>
</html>
