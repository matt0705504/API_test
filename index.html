<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>即時語音翻譯官 (Cloud STT 專業版 V3)</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-fade-in { animation: fadeIn 0.15s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 min-h-screen flex flex-col justify-between">

  <div class="w-full max-w-md mx-auto space-y-4 flex-1 flex flex-col">
    <h1 class="text-xl font-bold text-center text-indigo-600 my-2">🎙️ 即時語音翻譯官 (Cloud STT 專業版 V3)</h1>
    
    <div class="bg-white p-3 rounded-xl shadow-xs border border-slate-100">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">請選擇聆聽的語系：</label>
      <select id="langSelect" class="w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="en-US">英文 (English)</option>
        <option value="ja-JP">日文 (日本語)</option>
        <option value="ko-KR">韓文 (한국어)</option>
      </select>
    </div>

    <div class="flex-1 bg-white p-4 rounded-xl shadow-xs border border-slate-100 flex flex-col min-h-[350px]">
      <div class="flex-1 overflow-y-auto space-y-4 max-h-[65vh]" id="chatBox">
        <p id="placeholderText" class="text-slate-400 text-center text-sm mt-10">
          💡 使用雲端專業級音訊辨識。<br>點擊下方按鈕並允許麥克風權限，即可開始對話！
        </p>
      </div>
    </div>
  </div>

  <div class="w-full max-w-md mx-auto mt-4 sticky bottom-0 bg-slate-50 py-2">
    <button id="startBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98">
      <span id="btnIcon">🎙️</span> <span id="btnText">啟動麥克風聆聽</span>
    </button>
  </div>

  <script>
    // 🔗 您的 GAS 網頁應用程式 URL (已去除全形空白雜質)
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbygjv7tmxlBH18IItbUbftd-in7o8y8S7ndRbtpmRZsjX-uZZimBBVqa97bSBTy5imGow/exec"; 

    const startBtn = document.getElementById('startBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const langSelect = document.getElementById('langSelect');
    const chatBox = document.getElementById('chatBox');
    const placeholderText = document.getElementById('placeholderText');

    let isListening = false;
    let mediaRecorder = null;
    let audioChunks = [];
    
    // 智慧聲音偵測變數 (VAD)
    let audioContext = null;
    let analyser = null;
    let javascriptNode = null;
    let silenceTimer = null;
    let isSpeaking = false;

    // 音量分貝觸發門檻
    const SILENCE_THRESHOLD = 25; 
    const SILENCE_DURATION = 660; // 💡 講者安靜 0.66 秒立刻切斷斷句

    startBtn.addEventListener('click', () => {
      if (!isListening) {
        startAudioListening();
      } else {
        stopAudioListening();
      }
    });

    async function startAudioListening() {
      audioChunks = [];
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // 1. 初始化底層高效錄音器
        mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm;codecs=opus' });
        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) audioChunks.push(event.data);
        };

        mediaRecorder.onstop = () => {
          processAndSendAudio(); 
        };

        // 2. 初始化即時聲音頻率分析器 (VAD)
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 2048;
        source.connect(analyser);

        javascriptNode = audioContext.createScriptProcessor(2048, 1, 1);
        analyser.connect(javascriptNode);
        javascriptNode.connect(audioContext.destination);

        javascriptNode.onaudioprocess = () => {
          const array = new Uint8Array(analyser.frequencyBinCount);
          analyser.getByteFrequencyData(array);
          let values = 0;
          for (let i = 0; i < array.length; i++) { values += array[i]; }
          const averageVolume = values / array.length;

          if (averageVolume > SILENCE_THRESHOLD) {
            if (!isSpeaking) {
              isSpeaking = true;
              if (mediaRecorder.state === "inactive") mediaRecorder.start(10);
            }
            clearTimeout(silenceTimer); 
          } else {
            if (isSpeaking) {
              clearTimeout(silenceTimer);
              silenceTimer = setTimeout(() => {
                isSpeaking = false;
                if (mediaRecorder.state === "recording") {
                  mediaRecorder.stop(); 
                }
              }, SILENCE_DURATION);
            }
          }
        };

        isListening = true;
        if (placeholderText) placeholderText.remove();
        startBtn.className = "w-full py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
        btnText.innerText = "正在聆聽 (0.66秒停頓自動送翻)...";
        btnIcon.innerText = "🛑";

      } catch (err) {
        console.error("無法取得麥克風權限:", err);
        alert("請確認網頁是否擁有 HTTPS 安全憑證，並允許網頁使用麥克風。");
      }
    }

    function stopAudioListening() {
      isListening = false;
      clearTimeout(silenceTimer);
      
      if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
      if (javascriptNode) javascriptNode.disconnect();
      if (audioContext) audioContext.close();

      startBtn.className = "w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
      btnText.innerText = "啟動麥克風聆聽";
      btnIcon.innerText = "🎙️";
    }

    function processAndSendAudio() {
      if (audioChunks.length === 0) {
        if (isListening && !isSpeaking) mediaRecorder.start(10);
        return;
      }

      const audioBlob = new Blob(audioChunks, { type: 'audio/webm;codecs=opus' });
      audioChunks = []; 

      if (isListening && mediaRecorder.state === "inactive") {
        mediaRecorder.start(10);
      }

      const reader = new FileReader();
      reader.readAsDataURL(audioBlob);
      reader.onloadend = function() {
        const base64Data = reader.result.split(',')[1]; 
        
        const loadingNode = createLoadingMessage();

        fetch(GAS_WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({
            audio: base64Data,
            sourceLang: langSelect.value
          })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            renderFinalDialogue(data.recognizedText, data.translatedText, loadingNode);
          } else {
            loadingNode.remove();
            console.log("辨識為環境雜音或無有效字詞:", data.error);
          }
        })
        .catch(err => {
          loadingNode.remove();
          console.error("連線到 GAS 後端失敗:", err);
        });
      };
    }

    function createLoadingMessage() {
      const wrapper = document.createElement('div');
      wrapper.className = "space-y-2 w-full animate-pulse";
      wrapper.innerHTML = `
        <div class="bg-slate-200 p-3 rounded-xl max-w-[50%] text-xs text-slate-400">🗣️ 雲端辨識中...</div>
      `;
      chatBox.appendChild(wrapper);
      chatBox.scrollTop = chatBox.scrollHeight;
      return wrapper;
    }

    function renderFinalDialogue(originalText, translatedText, loadingNode) {
      if (loadingNode) loadingNode.remove();

      const originalDiv = document.createElement('div');
      originalDiv.className = "bg-slate-100 p-3 rounded-xl max-w-[85%] self-start text-sm text-slate-700 animate-fade-in";
      originalDiv.innerText = "🗣️ " + originalText;
      chatBox.appendChild(originalDiv);

      const translatedDiv = document.createElement('div');
      translatedDiv.className = "bg-indigo-50 p-3 rounded-xl max-w-[85%] ml-auto text-base font-semibold text-indigo-950 border border-indigo-100 mt-1 mb-2 shadow-xs animate-fade-in";
      translatedDiv.innerText = "📳 " + translatedText;
      chatBox.appendChild(translatedDiv);

      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
