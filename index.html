<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>即時語音翻譯官</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-fade-in {
      animation: fadeIn 0.25s ease-out forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 min-h-screen flex flex-col justify-between">

  <div class="w-full max-w-md mx-auto space-y-4 flex-1 flex flex-col">
    <h1 class="text-xl font-bold text-center text-indigo-600 my-2">🎙️ 即時語音翻譯官</h1>
    
    <div class="bg-white p-3 rounded-xl shadow-xs border border-slate-100">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">請選擇聆聽的語系：</label>
      <select id="langSelect" class="w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="en-US">英文 (English)</option>
        <option value="ja-JP">日文 (日本語)</option>
        <option value="ko-KR">韓文 (한국어)</option>
      </select>
    </div>

    <div class="flex-1 bg-white p-4 rounded-xl shadow-xs border border-slate-100 flex flex-col min-h-[350px]">
      <div class="flex-1 overflow-y-auto space-y-4 max-h-[65vh]" id="chatBox">
        <p id="placeholderText" class="text-slate-400 text-center text-sm mt-10">
          💡 請確保使用 Safari 或 Chrome 開啟。<br>點擊下方按鈕開始說話！
        </p>
      </div>
    </div>
  </div>

  <div class="w-full max-w-md mx-auto mt-4 sticky bottom-0 bg-slate-50 py-2">
    <button id="startBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98">
      <span id="btnIcon">🎙️</span> <span id="btnText">開始聆聽</span>
    </button>
  </div>

  <script>
    // ⚠️ 請在下方雙引號內替換為您在 Google Apps Script 複製的最新網頁應用程式 URL（結尾必須是 /exec）
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby_CGVuh2bccqFFgZE-GHq5yf2zZZek3JdZ7JcZC10A2QcXZ3fwxGCp5f4Jb-GUqsdQtQ/exec"; 

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const startBtn = document.getElementById('startBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const langSelect = document.getElementById('langSelect');
    const chatBox = document.getElementById('chatBox');
    const placeholderText = document.getElementById('placeholderText');

    let recognition = null;
    let isListening = false;

    if (!SpeechRecognition) {
      alert("瀏覽器不支援語音辨識，請改用 Safari (iOS) 或 Chrome (Android)。");
    } else {
      // 初始化語音辨識
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false;

      // 當辨識到語音時觸發
      recognition.onresult = function(event) {
        let resultIndex = event.resultIndex;
        let originalText = event.results[resultIndex][0].transcript;
        
        // 🛠️ 關鍵防呆機制：如果辨識出空字串、純空白、或環境雜訊，直接過濾不送後端
        if (!originalText || originalText.trim() === "" || originalText.trim().length === 0) {
          console.log("偵測到無效空白句，已自動忽略。");
          return; 
        }

        // 把前後空白清乾淨
        originalText = originalText.trim();

        // 畫面上顯示使用者說的原文
        appendMessage(originalText, 'original');
        
        // 取得語言代碼前兩碼 (例如 en-US -> en) 傳給後端
        const sourceLangShort = langSelect.value.split('-')[0]; 

        // 封裝標準安全 GET 網址
        const targetUrl = `${GAS_WEB_APP_URL}?text=${encodeURIComponent(originalText)}&sourceLang=${sourceLangShort}`;

        // 發送給 GAS 後端翻譯
        fetch(targetUrl, {
          method: "GET",
          mode: "cors"
        })
        .then(res => {
          if (!res.ok) throw new Error("網路回應不正常");
          return res.json();
        })
        .then(response => {
          if (response.success) {
            // 成功：在畫面上印出繁體中文翻譯
            appendMessage(response.translatedText, 'translated');
          } else {
            console.error("GAS 內部翻譯出錯:", response.error);
          }
        })
        .catch(err => {
          // 只有在真正斷網、網址填錯或後端死機時才會顯示錯誤，避免零星的空白請求造成閃退
          console.error("連線發生異常:", err);
          appendMessage("連線後端逾時或失敗，請檢查網路連線。", 'error');
        });
      };

      // 錯誤處理
      recognition.onerror = function(event) {
        console.error("語音辨識發生錯誤: ", event.error);
        if (event.error === 'not-allowed') {
          alert("麥克風存取遭拒，請至手機設定中確認瀏覽器麥克風權限已開啟。");
          stopListening();
        }
      };

      // 自動重啟機制（避免手機講完一句太久沒說話自動斷開）
      recognition.onend = function() {
        if (isListening) {
          try {
            recognition.start();
          } catch(e) {
            console.log("重啟辨識中...");
          }
        }
      };
    }

    // 按鈕切換點擊事件
    startBtn.addEventListener('click', () => {
      if (!recognition) return;
      if (!isListening) {
        startListening();
      } else {
        stopListening();
      }
    });

    function startListening() {
      isListening = true;
      recognition.lang = langSelect.value;
      try {
        recognition.start();
        startBtn.className = "w-full py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
        btnText.innerText = "正在聆聽、即時翻譯中...";
        btnIcon.innerText = "🛑";
        if (placeholderText) placeholderText.remove();
      } catch (e) {
        console.error("啟動辨識失敗:", e);
      }
    }

    function stopListening() {
      isListening = false;
      recognition.stop();
      startBtn.className = "w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
      btnText.innerText = "開始聆聽";
      btnIcon.innerText = "🎙️";
    }

    // 在畫面上產生對話對話框
    function appendMessage(text, type) {
      const msgDiv = document.createElement('div');
      if (type === 'original') {
        msgDiv.className = "bg-slate-100 p-3 rounded-xl max-w-[85%] self-start text-sm text-slate-600 animate-fade-in";
        msgDiv.innerText = "🗣️ " + text;
      } else if (type === 'translated') {
        msgDiv.className = "bg-indigo-50 p-3 rounded-xl max-w-[85%] ml-auto text-base font-semibold text-indigo-950 border border-indigo-100 mt-1 mb-2 shadow-xs animate-fade-in";
        msgDiv.innerText = "📳 " + text;
      } else {
        msgDiv.className = "bg-red-50 text-red-600 p-2 text-xs rounded-lg text-center font-medium animate-fade-in";
        msgDiv.innerText = text;
      }
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight; // 自動捲動到最底
    }
  </script>
</body>
</html>
  <script>
    // ⚠️ 請在此處貼上你剛剛在第一步複製的 GAS 網頁應用程式 URL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxTW6wzmEab3x5cIuHzujnfAIwbDFjum8rPT5CkB5AIDSkkgP7nxjaoyQuljNDWkon_MQ/exec"; 

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const startBtn = document.getElementById('startBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const langSelect = document.getElementById('langSelect');
    const chatBox = document.getElementById('chatBox');
    const placeholderText = document.getElementById('placeholderText');

    let recognition = null;
    let isListening = false;

    if (!SpeechRecognition) {
      alert("瀏覽器不支援語音辨識，請改用 Safari 或 Chrome。");
    } else {
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false;

      recognition.onresult = function(event) {
        let resultIndex = event.resultIndex;
        let originalText = event.results[resultIndex][0].transcript;
        if (!originalText || originalText.trim() === "") return;

        appendMessage(originalText, 'original');
        const sourceLangShort = langSelect.value.split('-')[0]; 

        // 透過標準 Fetch API 發送給 GAS 後端翻譯
        fetch(GAS_WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify({ text: originalText, sourceLang: sourceLangShort })
        })
        .then(res => res.json())
        .then(response => {
          if (response.success) {
            appendMessage(response.translatedText, 'translated');
          } else {
            appendMessage("翻譯失敗: " + response.error, 'error');
          }
        })
        .catch(err => appendMessage("連線後端失敗: " + err, 'error'));
      };

      recognition.onerror = function(event) {
        if (event.error === 'not-allowed') alert("麥克風存取遭拒！");
      };

      recognition.onend = function() {
        if (isListening) recognition.start();
      };
    }

    startBtn.addEventListener('click', () => {
      if (!recognition) return;
      if (!isListening) {
        isListening = true;
        recognition.lang = langSelect.value;
        recognition.start();
        startBtn.className = "w-full py-4 bg-red-500 text-white font-semibold rounded-2xl shadow-lg flex justify-center items-center gap-2";
        btnText.innerText = "正在聆聽、即時翻譯中...";
        btnIcon.innerText = "🛑";
        if (placeholderText) placeholderText.remove();
      } else {
        isListening = false;
        recognition.stop();
        startBtn.className = "w-full py-4 bg-indigo-600 text-white font-semibold rounded-2xl shadow-lg flex justify-center items-center gap-2";
        btnText.innerText = "開始聆聽";
        btnIcon.innerText = "🎙️";
      }
    });

    function appendMessage(text, type) {
      const msgDiv = document.createElement('div');
      if (type === 'original') {
        msgDiv.className = "bg-slate-100 p-3 rounded-xl max-w-[85%] self-start text-sm text-slate-600";
        msgDiv.innerText = "🗣️ " + text;
      } else if (type === 'translated') {
        msgDiv.className = "bg-indigo-50 p-3 rounded-xl max-w-[85%] ml-auto text-base font-semibold text-indigo-950 border border-indigo-100 mt-1 mb-2";
        msgDiv.innerText = "📳 " + text;
      } else {
        msgDiv.className = "bg-red-50 text-red-600 p-2 text-xs rounded-lg text-center";
        msgDiv.innerText = text;
      }
      chatBox.appendChild(msgDiv);
      chatBox.scrollTop = chatBox.scrollHeight;
    }
  </script>
</body>
</html>
