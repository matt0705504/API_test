<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>即時語音翻譯官</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 p-4 min-h-screen flex flex-col justify-between">

  <div class="w-full max-w-md mx-auto space-y-4 flex-1 flex flex-col">
    <h1 class="text-xl font-bold text-center text-indigo-600 my-2">🎙️ 即時語音翻譯官 (時間戳精準隔離版)</h1>
    
    <div class="bg-white p-3 rounded-xl shadow-xs border border-slate-100">
      <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">請選擇聆聽的語系：</label>
      <select id="langSelect" class="w-full p-2.5 border border-slate-200 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-indigo-500">
        <option value="en-US">英文 (English)</option>
        <option value="ja-JP">日文 (日本語)</option>
        <option value="ko-KR">韓文 (한국어)</option>
      </select>
    </div>

    <div class="flex-1 bg-white p-4 rounded-xl shadow-xs border border-slate-100 flex flex-col min-h-[350px]">
      <div class="flex-1 overflow-y-auto space-y-4 max-h-[65vh]" id="chatBox">
        <p id="placeholderText" class="text-slate-400 text-center text-sm mt-10">
          💡 請確保使用 Safari 或 Chrome 開啟。<br>點擊下方按鈕開始說話！
        </p>
      </div>
    </div>
  </div>

  <div class="w-full max-w-md mx-auto mt-4 sticky bottom-0 bg-slate-50 py-2">
    <button id="startBtn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98">
      <span id="btnIcon">🎙️</span> <span id="btnText">開始聆聽</span>
    </button>
  </div>

  <script>
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbykYYBFOJrudwkIBQpNBFu_XegToC7nlYtJYnZigGanFHVlLIwj9syZdp-Cp4kO-BlA/exec"; 

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const startBtn = document.getElementById('startBtn');
    const btnText = document.getElementById('btnText');
    const btnIcon = document.getElementById('btnIcon');
    const langSelect = document.getElementById('langSelect');
    const chatBox = document.getElementById('chatBox');
    const placeholderText = document.getElementById('placeholderText');

    let recognition = null;
    let isListening = false;
    let oneSecondTimer = null; 

    // 🚀 【終極防線】時間戳記鎖與獨立累積字串
    let lastCutTime = 0;   // 記錄上一次斷句丟翻譯的精準時間
    let textBuffer = "";   // 我們自己控制的乾淨存錢筒

    if (!SpeechRecognition) {
      alert("瀏覽器不支援語音辨識，請改用 Safari (iOS) 或 Chrome (Android)。");
    } else {
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true; 

      recognition.onresult = function(event) {
        if (placeholderText) placeholderText.remove();

        // ⏱️ 獲取這一包語音訊號到達的精準時間
        const resultReceivedTime = Date.now();

        // 🛑 防火牆：如果這一包訊號是在我們上次「下刀斷句點」之前或當下產生的殘留雜訊，直接蒸發它！
        if (resultReceivedTime <= lastCutTime) {
          return;
        }

        let finalTranscript = '';
        let interimTranscript = '';

        // 只讀取自本次聆聽啟動或重設後，目前軌道上的新字
        for (let i = event.resultIndex; i < event.results.length; ++i) {
          if (event.results[i].isFinal) {
            finalTranscript += event.results[i][0].transcript;
          } else {
            interimTranscript += event.results[i][0].transcript;
          }
        }

        let cleanFinal = finalTranscript.trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?？。，！]/g," ");
        let cleanInterim = interimTranscript.trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?停頓]/g," ");

        // 將確定的字句塞進獨立存錢筒
        if (cleanFinal.length > 0) {
          textBuffer = (textBuffer + " " + cleanFinal).trim().replace(/\s+/g, " ");
        }

        // 當前畫面上要同步流暢長大的完整字串
        let currentLiveSpeech = (textBuffer + " " + cleanInterim).trim().replace(/\s+/g, " ");

        if (!currentLiveSpeech || currentLiveSpeech.length === 0) return;

        // 步驟 1：邊講邊收集，畫面左側同步流暢跑出文字，完全不卡
        updateLiveOriginalMessage(currentLiveSpeech);

        // ⏱️ 1秒智慧斷句計時器
        clearTimeout(oneSecondTimer);
        oneSecondTimer = setTimeout(() => {
          
          // 📸 1. 執行斷句，擷取這一瞬間緩衝區的最終文字快照
          const textToTranslate = currentLiveSpeech;
          
          // 🔒 2. 【核心大鎖】：將斷句時間定格在這一毫秒！
          // 丟翻譯的同時，背景繼續收集接下來的內容。有了這行，任何慢半拍的舊殘留訊號都會被上面的防火牆彈開！
          lastCutTime = Date.now();

          // 🧹 3. 立即無縫清空存錢筒，迎接接下來步驟 2 的全新對話
          textBuffer = "";

          // 定格當前原文 HTML 節點，綁定給非同步執行緒
          const liveNode = finalizeLiveMessage();

          // 丟給背景持續作業，不卡死主執行緒
          sendToTranslate(textToTranslate, liveNode);

        }, 1000); // 💡 精準 1 秒停頓斷句
      };

      // 核心發送翻譯函式 (非同步平行處理)
      function sendToTranslate(textToTranslate, targetOriginalNode) {
        if (!textToTranslate || textToTranslate.trim().length === 0) return;

        const sourceLangShort = langSelect.value.split('-')[0]; 
        const targetUrl = `${GAS_WEB_APP_URL}?text=${encodeURIComponent(textToTranslate)}&sourceLang=${sourceLangShort}`;

        // 步驟 3：背景平行 fetch 翻譯，不干擾前台繼續收集內容
        fetch(targetUrl, {
          method: "GET",
          mode: "cors"
        })
        .then(res => {
          if (!res.ok) throw new Error("網路回應不正常");
          return res.json();
        })
        .then(response => {
          if (response.success) {
            // 翻譯完成後立即顯示，精準插在當初那段原文的正下方
            appendMessageAfterNode(response.translatedText, targetOriginalNode);
          }
        })
        .catch(err => {
          console.error("背景翻譯連線失敗:", err);
        });
      }

      recognition.onerror = function(event) {
        console.error("語音辨識發生錯誤: ", event.error);
        if (event.error === 'not-allowed') {
          alert("麥克風存取遭拒，請至手機設定中確認瀏覽器麥克風權限已開啟。");
          stopListening();
        }
      };

      recognition.onend = function() {
        if (isListening) {
          try { recognition.start(); } catch(e) { console.log("重啟辨識中..."); }
        }
      };
    }

    startBtn.addEventListener('click', () => {
      if (!recognition) return;
      if (!isListening) { startListening(); } else { stopListening(); }
    });

    function startListening() {
      isListening = true;
      recognition.lang = langSelect.value;
      textBuffer = ""; 
      lastCutTime = Date.now(); // 啟動時初始化時間鎖
      try {
        recognition.start();
        startBtn.className = "w-full py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
        btnText.innerText = "正在聆聽、即時翻譯中...";
        btnIcon.innerText = "🛑";
      } catch (e) {
        console.error("啟動辨識失敗:", e);
      }
    }

    function stopListening() {
      isListening = false;
      recognition.stop();
      startBtn.className = "w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-2xl shadow-lg transition duration-200 flex justify-center items-center gap-2 active:scale-98";
      btnText.innerText = "開始聆聽";
      btnIcon.innerText = "🎙️";
    }

    function updateLiveOriginalMessage(text) {
      let lastMsg = chatBox.lastElementChild;
      if (lastMsg && lastMsg.classList.contains('is-live-original')) {
        lastMsg.innerText = "🗣️ " + text;
      } else {
        const msgDiv = document.createElement('div');
        msgDiv.className = "bg-slate-100 p-3 rounded-xl max-w-[85%] self-start text-sm text-slate-600 animate-fade-in is-live-original";
        msgDiv.innerText = "🗣️ " + text;
        chatBox.appendChild(msgDiv);
      }
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function finalizeLiveMessage() {
      let lastMsg = chatBox.lastElementChild;
      if (lastMsg && lastMsg.classList.contains('is-live-original')) {
        lastMsg.classList.remove('is-live-original');
        return lastMsg;
      }
      return null;
    }

    function appendMessageAfterNode(translatedText, originalNode) {
      const msgDiv = document.createElement('div');
      msgDiv.className = "bg-indigo-50 p-3 rounded-xl max-w-[85%] ml-auto text-base font-semibold text-indigo-950 border border-indigo-100 mt-1 mb-2 shadow-xs animate-fade-in";
      msgDiv.innerText = "📳 " + translatedText;
      
      if (originalNode && originalNode.parentNode) {
        originalNode.parentNode.insertBefore(msgDiv, originalNode.nextSibling);
      } else {
        chatBox.appendChild(msgDiv);
      }
      chatBox.scrollTop = chatBox.scrollHeight; 
    }
  </script>
</body>
</html>
